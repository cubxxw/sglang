# Sglang Workflow Add Or Update Diffusion Model Pipeline

## Action

Follow the add-or-update-diffusion-model-pipeline workflow:
1. Add or update config files in python/sglang/multimodal_gen/configs/
2. Modify or add runtime pipeline files in python/sglang/multimodal_gen/runtime/pipelines/ and pipelines_core/stages/
3. Update registry and server_args if needed
4. Update or add related test cases and performance baselines
5. Update documentation for compatibility matrix

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: python/sglang/multimodal_gen/configs/**/*, python/sglang/multimodal_gen/runtime/pipelines/*.py, python/sglang/multimodal_gen/runtime/pipelines_core/stages/*.py

