# Sglang Workflow Update Cookbook Documentation And Snippets

## Action

Follow the update-cookbook-documentation-and-snippets workflow:
1. Edit or add .mdx file under docs_new/cookbook/autoregressive/<Model>/
2. Update or add code snippet in docs_new/src/snippets/autoregressive/<model>-deployment.jsx
3. Optionally update docs_new/docs.json to register the new documentation

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: docs_new/cookbook/autoregressive/*/*.mdx, docs_new/src/snippets/autoregressive/*.jsx, docs_new/docs.json

